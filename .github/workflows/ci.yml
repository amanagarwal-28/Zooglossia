name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-test:
    name: API Server Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api-server/package-lock.json

      - name: Install dependencies
        working-directory: api-server
        run: npm ci

      - name: Run tests
        working-directory: api-server
        run: npm test

  mobile-test:
    name: Mobile App Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile-app/package-lock.json

      - name: Install dependencies
        working-directory: mobile-app
        run: npm ci --legacy-peer-deps

      - name: Run tests
        working-directory: mobile-app
        run: npm test

  ai-lint:
    name: AI Service Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ai-service/requirements.txt

      - name: Install ruff
        run: pip install ruff==0.15.11

      - name: Lint
        working-directory: ai-service
        run: ruff check . --select E,F,W --ignore E501

  ai-test:
    name: AI Service Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ai-service/requirements.txt

      - name: Install test dependencies
        run: |
          pip install pytest numpy
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Run AI service tests
        working-directory: ai-service
        run: pytest tests/ -v --tb=short

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build api-server image
        run: docker build -t zooglossia-api ./api-server

      - name: Build ai-service image
        run: docker build -t zooglossia-ai ./ai-service
